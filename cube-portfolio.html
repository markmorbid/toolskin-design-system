<style>
  /* ════════════════════════════════════════════════════════════════════
 * TS CUBE PORTFOLIO  —  EXTRACTED HEADER STYLES  (PENDING INTEGRATION)
 * ════════════════════════════════════════════════════════════════════
 *
 * STATUS
 * ──────────────────────────────────────────────────────────────────
 * These styles are extracted from the cube-portfolio source. They
 * are pending: filtering, tokenization, updating, and seamless
 * adaptation INTO the core CSS — preserving the current visual
 * snapshot while avoiding the creation of new classes and reusing
 * the existing Toolskin base.
 *
 * Keep ONLY what does not already exist in core for displaying or
 * rendering. Diff the unique properties during the refactor and
 * fold them into existing components / variants.
 *
 * Alternatively, this file may stay isolated UNTIL integration is
 * complete — but the final cube-portfolio component MUST NOT ship
 * with its own dedicated CSS sheet.
 *
 * ────────────────────────────────────────────────────────────────────
 * GLOBAL POLICY  (read before editing)
 * ────────────────────────────────────────────────────────────────────
 * - Keep ONLY elements that are irreplaceable and do not match any
 *   existing pattern in the core.
 * - The rest can be assembled in the HTML using existing core
 *   classes / variants.
 * - Creating new classes for things that share properties with
 *   existing components conflicts with general product deployment.
 * - Rely ONLY on the core CSS, the asset-based system, and its
 *   filebase. Do NOT generate new elements for things that share
 *   properties with what already exists.
 * - Same applies to tokens: replace ad-hoc values with the current
 *   production tokens wherever possible.
 *
 * ────────────────────────────────────────────────────────────────────
 * PER-ELEMENT INTEGRATION PLAN
 * ────────────────────────────────────────────────────────────────────
 *
 *  1. RULERS
 *     The ruler elements are mostly built in JS — VERY FEW CSS
 *     elements are needed. Those few must persist.
 *     → Use surface tokens, NOT hardcoded colors, so that
 *       light-theme switching remains valid.
 *
 *  2. BACKGROUND BIG-LETTER DESIGN
 *     Add as another variant on the core design base.
 *     → Needs integration, tokenization, and adaptability.
 *
 *  3. SWIPE / WIPE NAVIGATION
 *     Integration is already noted in the isolated JS file (which
 *     also needs splitting).
 *     → The styling and handling must be economized and minimized,
 *       while keeping the same rendering / display capability.
 *
 *  4. SIDEBAR  ⚠ NAMING CONFLICT
 *     The class `ts-sidebar` already exists in core. It must be
 *     REPLACED, not re-scoped — across JS, HTML, and CSS.
 *     Do NOT keep it: it will break everything.
 *
 *  5. MOVING / SLIDING MENU ITEMS
 *     Should not be a problem to refactor using existing Toolskin
 *     tokens, classes, and styles. NO new classes should be
 *     created for this — variants only, if needed.
 *     The actual COMPONENT is the sliding sidebar. Only the items
 *     and their interactions will carry rules. Optimize as much as
 *     possible and avoid creating new classes where elements
 *     visually share properties. Same for tokens — replace with
 *     current production tokens where possible.
 *     This scope is for display purposes only.
 *
 *  6. LOADER
 *     Must be unified with the system's `ts-preloader`:
 *       - Share styles, DOM, and CSS via aliases / class pending.
 *       - Add the remaining DOM elements needed to match.
 *     The JS must remain as it is — it is fit for loading the
 *     currently deployed assets.
 *
 *  7. 3D INTERACTIVE CUBE  (still experimental)
 *     Works and is usable, but it must become dynamic: able to
 *     load elements from a gallery source (posts, a folder, or a
 *     JSON feed) and to bind menu entries to cube tiles
 *     dynamically through hooks, while remaining a separate asset.
 *
 *  8. COMPONENT PAIRING  (ts-cube-gallery + ts-slide-menu)
 *     - `ts-cube-gallery` is an integratable component on its own.
 *     - `ts-slide-menu` (pending rename) is a standalone asset
 *       with hooks for the cube and any other navigation /
 *       gallery system. Both need integration.
 *
 * ════════════════════════════════════════════════════════════════════ */


/* ── THEME TOKENS  (locals only — DO NOT promote, see policy above) ── */
:root {
  --ts-accent-h: 18;
  --ts-accent-s: 100%;
  --ts-accent-l: 52%;
  --ts-bg-body: #080809;
  --ts-bg-0: #0b0b0d;
  --ts-bg-1: #101012;
  --ts-bg-2: #16161a;
  --ts-bg-3: #1d1d22;
  --ts-bg-4: #252529;
  --ts-font-display: 'Syne', system-ui, sans-serif;
  --ts-font-body: 'Space Grotesk', system-ui, sans-serif;
  --ts-font-mono: 'JetBrains Mono', monospace;
  --sw: 250px;
  /* sidebar width  */
  --rsz: 25px;
  /* ruler size     */
  --nh: 45px;
  /* nav height     */
}

*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html,
body {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: var(--ts-bg-body);
  color: var(--ts-text-primary);
  font-family: var(--ts-font-body);
}

/* ── CURSOR ──  (currently disabled — see commented block) */
/*#tsc {
    position:fixed; z-index:9999; pointer-events:none;
    width:8px; height:8px; border-radius:50%;
    background:#fff; mix-blend-mode:difference;
    transform:translate(-50%,-50%);
    transition:width .2s cubic-bezier(.16,1,.3,1), height .2s cubic-bezier(.16,1,.3,1);
    will-change:left,top;
  }
  #tsc.big { width:38px; height:38px; }
  */

/* ── LOADER ──
 * INTEGRATION: must be unified with system `ts-preloader`. See
 * point 6 of the per-element plan above. */
#ts-loader {
  position: fixed;
  inset: 0;
  z-index: 8000;
  background: var(--ts-bg-body);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 15px;
  transition: opacity .65s, visibility .65s;
}

#ts-loader.out {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}

#ts-loader-track {
  width: 180px;
  height: 1px;
  background: rgba(255, 255, 255, .07);
  position: relative;
  overflow: hidden;
}

#ts-loader-fill {
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  background: var(--ts-accent);
  width: 0%;
  transition: none;
}

#ts-loader-num {
  font-family: var(--ts-font-mono);
  font-size: 10px;
  letter-spacing: .2em;
  color: rgba(255, 255, 255, .3);
}

/* ── RULERS ──
 * Legacy DOM-based ruler. Superseded by the SVG ruler below
 * (`.ts-grid-rules*`). Few CSS elements only — these MUST persist
 * during integration. Replace `rgba(255,255,255,.05)` borders with
 * surface tokens to keep light-theme switching valid. */
#ts-rt {
  position: fixed;
  top: 0;
  left: var(--rsz);
  right: 0;
  height: var(--rsz);
  z-index: 500;
  pointer-events: none;
  border-bottom: 1px solid rgba(255, 255, 255, .05);
  display: flex;
  align-items: flex-end;
  overflow: hidden;
}

.rstk {
  flex: 1;
  height: 4px;
  border-left: 1px solid rgba(255, 255, 255, .05);
  position: relative;
}

.rstk.m {
  height: 9px;
}

.rstk.m::before {
  content: attr(data-v);
  position: absolute;
  bottom: 11px;
  left: 2px;
  font-size: 7px;
  font-family: var(--ts-font-mono);
  color: rgba(255, 255, 255, .2);
  white-space: nowrap;
}

#ts-rl {
  position: fixed;
  top: var(--rsz);
  left: 0;
  bottom: 0;
  width: var(--rsz);
  z-index: 500;
  pointer-events: none;
  border-right: 1px solid rgba(255, 255, 255, .05);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.rsvtk {
  flex: 1;
  border-top: 1px solid rgba(255, 255, 255, .05);
}

/* ── TOPBAR ──
 * Likely fully replaceable by an existing core nav variant. Audit
 * before keeping any rule here. */
#ts-topbar {
  position: fixed;
  top: var(--rsz);
  left: var(--rsz);
  right: 0;
  height: var(--nh);
  z-index: 400;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 22px;
  border-bottom: 1px solid rgba(255, 255, 255, .05);
  background: color-mix(in srgb, var(--ts-bg-body) 88%, transparent);
  backdrop-filter: blur(14px);
}

.ts-dims {
  font-family: var(--ts-font-mono);
  font-size: 10px;
  color: rgba(255, 255, 255, .22);
  letter-spacing: .05em;
}

.ts-nav {
  display: flex;
  list-style: none;
  gap: 0;
}

.ts-nav a {
  font-size: 11px;
  color: rgba(255, 255, 255, .5);
  text-decoration: none;
  transition: color .2s;
}

.ts-nav a:hover {
  color: var(--ts-accent);
}

.ts-nav li:not(:last-child) a::after {
  content: ',\00a0';
  color: rgba(255, 255, 255, .18);
}

.ts-avail {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--ts-font-mono);
  font-size: 10px;
  color: rgba(255, 255, 255, .28);
  letter-spacing: .1em;
}

.ts-avail-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--ts-accent);
  animation: tspulse 2s ease-in-out infinite;
}

@keyframes tspulse {

  0%,
  100% {
    opacity: 1;
    transform: scale(1)
  }

  50% {
    opacity: .3;
    transform: scale(.6)
  }
}

/* ── MAIN SHELL ── */
#ts-shell {
  position: fixed;
  top: calc(var(--rsz) + var(--nh));
  left: var(--rsz);
  right: 0;
  bottom: 0;
  display: flex;
  overflow: hidden;
}

/* ── HERO ── */
#ts-hero {
  flex: 1;
  position: relative;
  overflow: hidden;
}

/* WebGL canvas fills hero */
#ts-cv {
  position: absolute;
  inset: 0;
  /*  width:100%!important;
    height:100%!important;
    pointer-events:none; */
  z-index: 1;
  display: block;
}

/* TS giant letters
 * INTEGRATION: promote as a variant on the core design base —
 * "background big-letter" treatment. Tokenize the color and the
 * size clamp. See point 2 of the per-element plan above. */
#ts-letters {
  position: absolute;
  bottom: -0.07em;
  left: -0.01em;
  font-family: var(--ts-font-display);
  font-size: clamp(160px, 28vw, 430px);
  font-weight: 900;
  line-height: 1;
  letter-spacing: -0.06em;
  color: var(--ts-accent);
  user-select: none;
  pointer-events: none;
  z-index: 2;
  opacity: 0;
  transform: translateY(var(--rsz));
}

/* Bottom metas */
#ts-meta-bl {
  position: absolute;
  bottom: 24px;
  left: 24px;
  z-index: 10;
  opacity: 0;
  transform: translateY(10px);
}

.ts-mname {
  font-size: 13px;
  font-weight: 500;
}

.ts-mrole {
  font-size: 11px;
  font-weight: 300;
  color: rgba(255, 255, 255, .3);
}

#ts-meta-bc {
  position: absolute;
  bottom: 24px;
  left: 50%;
  z-index: 10;
  transform: translateX(-50%) translateY(10px);
  text-align: center;
  opacity: 0;
}

.ts-missue {
  font-family: var(--ts-font-mono);
  font-size: 10px;
  color: rgba(255, 255, 255, .25);
  letter-spacing: .1em;
  line-height: 1.9;
}

/* ── SIDEBAR ──  ⚠ NAMING CONFLICT
 * `#ts-sidebar` collides with an existing core component named the
 * same way. Must be REPLACED (not re-scoped) across JS, HTML, and
 * CSS during integration. Do NOT keep this ID — it will break
 * everything. See point 4 of the per-element plan above. */
#ts-sidebar {
  width: var(--sw);
  flex-shrink: 0;
  border-left: 1px solid rgba(255, 255, 255, .05);
  position: relative;
  overflow: hidden;
}

#ts-mt {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  will-change: transform;
}

/* Sliding menu items (.ts-wl)
 * INTEGRATION: refactor onto existing Toolskin tokens / classes.
 * No new classes should be created — variants only, if needed.
 * The COMPONENT is the sliding sidebar; only items and their
 * interactions carry rules here. See point 5 of the plan above. */
.ts-wl {
  display: block;
  padding: 11px 22px;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: .01em;
  color: rgba(255, 255, 255, .45);
  border-bottom: 1px solid rgba(255, 255, 255, .05);
  text-decoration: none;
  position: relative;
  overflow: hidden;
  white-space: nowrap;
  /* wave-reveal */
  opacity: 0;
  transform: translateY(12px) skewY(1.5deg);
  transition: color .22s, padding-left .3s cubic-bezier(.16, 1, .3, 1);
}

.ts-wl.revealed {
  opacity: 1;
  transform: translateY(0) skewY(0);
}

.ts-wl::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 0;
  background: var(--ts-accent-dim, rgba(255, 84, 10, .08));
  transition: width .3s cubic-bezier(.16, 1, .3, 1);
}

/* Only ONE item is active — the directly hovered one */
.ts-wl.is-active {
  color: var(--ts-accent) !important;
  padding-left: 30px !important;
  font-weight: 500;
}

.ts-wl.is-active::before {
  width: 100%;
}

.ts-wl.is-dimmed {
  color: rgba(255, 255, 255, .13) !important;
}

.ts-wl.is-dimmed::before {
  width: 0;
}

/* ── PAGE WIPE ──
 * INTEGRATION: economize and minimize the styling/handling while
 * preserving rendering parity. See point 3 of the plan above. */
#ts-wipe {
  position: fixed;
  inset: 0;
  z-index: 7000;
  background: var(--ts-bg-0);
  pointer-events: none;
  transform: scaleY(0);
  transform-origin: bottom;
}

/* ── DETAIL PAGE ── */
#ts-detail {
  position: fixed;
  inset: 0;
  z-index: 6000;
  background: var(--ts-bg-0);
  transform: translateY(100%);
  display: flex;
  flex-direction: column;
  pointer-events: none;
  overflow-y: auto;
}

#ts-detail.open {
  pointer-events: all;
}

#ts-dback {
  position: sticky;
  top: 0;
  z-index: 10;
  padding: 14px 32px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid rgba(255, 255, 255, .05);
  background: var(--ts-bg-0);
  font-size: 10px;
  letter-spacing: .15em;
  font-family: var(--ts-font-mono);
  color: rgba(255, 255, 255, .38);
  transition: color .2s;
}

#ts-dback:hover {
  color: var(--ts-accent);
}

#ts-dbody {
  padding: 60px 80px 100px;
  flex: 1;
}

.ts-dol {
  font-size: 9px;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: var(--ts-accent);
  margin-bottom: 20px;
  display: block;
  font-family: var(--ts-font-mono);
}

.ts-dtitle {
  font-family: var(--ts-font-display);
  font-size: clamp(40px, 5.5vw, 84px);
  font-weight: 900;
  letter-spacing: -.05em;
  line-height: .93;
  margin-bottom: 26px;
}

.ts-dtitle em {
  color: var(--ts-accent);
  font-style: normal;
}

.ts-ddesc {
  font-size: 14px;
  line-height: 1.75;
  font-weight: 300;
  color: rgba(255, 255, 255, .42);
  max-width: 500px;
}

.ts-dmeta {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 2px;
  margin: 44px 0;
}

.ts-dmetablock {
  padding: var(--rsz);
  border: 1px solid rgba(255, 255, 255, .06);
}

.ts-dmetalabel {
  font-size: 9px;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: rgba(255, 255, 255, .25);
  display: block;
  margin-bottom: 6px;
  font-family: var(--ts-font-mono);
}

.ts-dmetaval {
  font-size: 13px;
  font-weight: 500;
}

.ts-dimgs {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 3px;
}

.ts-dimgs img {
  width: 100%;
  aspect-ratio: 4/3;
  object-fit: cover;
  display: block;
}

/* ── SVG RULERS  (current implementation)
 * Promote to a Toolskin core component. Document in the codebase
 * showcase docs as one of the flagship innovations of the system.
 * Replace stroke / fill rgba values with surface tokens before
 * promotion, to keep light-theme switching valid. */
.ts-grid-rules {
  position: absolute;
  inset: 0;
  pointer-events: none;
  font-size: 10px;
  font-family: monospace;
}

.ts-grid-rules__horizontal {
  position: absolute;
  top: 0;
  left: 0;
  min-height: var(--rsz);
  height: var(--rsz);
  max-height: var(--rsz);
}

.ts-grid-rules__vertical {
  position: absolute;
  top: 0;
  left: 0;
  min-width: var(--rsz);
  width: var(--rsz);
  max-width: var(--rsz);
}

.ts-grid-rules-line {
  stroke: rgba(255, 255, 255, 0.4);
  shape-rendering: crispEdges;
}

.ts-grid-rules-text {
  fill: rgba(255, 255, 255, 0.6);
  font-size: 8px;
  dominant-baseline: text-after-edge;
  font-weight: 300;
  text-anchor: middle;
  line-height: 1em;
  font-variation-settings: "wdth" 100, "wght" 800, "opsz" 30;
  letter-spacing: .02em;
}

</style>
</head>

</div>

<div id="ts-app" class="ts-cube-portfolio">
  

      <!-- WIPE + DETAIL -->

      <div id="ts-detail" role="dialog" aria-modal="true">

<script>
/* ════════════════════════════════════════════════════════════════════
 * TS CUBE PORTFOLIO — ISOLATED SCRIPTS  (PENDING INTEGRATION)
 * ════════════════════════════════════════════════════════════════════
 *
 * STATUS
 * ──────────────────────────────────────────────────────────────────
 * Not currently in use. Read every comment in this file — they are
 * not all labeled, and several flag refactor/integration work.
 *
 * Extracted from the standalone "ts-cube-portfolio" HTML file:
 * a special gallery view built from several innovative components,
 * styled mostly with Toolskin tokens. A few isolated CSS rules
 * remain inline and are also pending integration.
 *
 * SCOPE OF THIS FILE
 * ──────────────────────────────────────────────────────────────────
 * This is the isolated header script. It is pending refactor into
 * one or more reusable Toolskin modules. The HTML source is
 * standalone; integration must NOT remain isolated-scope — every
 * unit below has to become a reusable, hookable module.
 *
 * MODULES TO EXTRACT  (refactor targets)
 * ──────────────────────────────────────────────────────────────────
 *
 *  1. buildRulers()  — auto-generated ruler frame + live viewport
 *     size counter. Renders the top and left rulers (lines +
 *     numeric labels) directly over the layout, with no HTML
 *     markup required. Smart, economical loop.
 *     → Promote to a core component asset and showcase it in the
 *       Toolskin codebase docs as one of the flagship innovations.
 *
 *  2. Animated dynamic scrolling infinite sidebar menu
 *     Needs optimization and automation. All content is currently
 *     hardcoded; at minimum it should fetch from a JSON source.
 *     Inlining all that content here is not acceptable long-term.
 *     → Once integrated, modules must be activatable independently,
 *       not globally on the view.
 *
 *  3. 3D interactive cube  — still experimental
 *     Works and is usable, but it must become dynamic: able to load
 *     elements from a gallery source (posts, a folder, or a JSON
 *     feed) and to bind menu entries to cube tiles dynamically via
 *     hooks, while remaining a separate asset.
 *
 *  4. Component pairing  (ts-cube-gallery + ts-slide-menu)

/* ════════════════════════════════════════════════════════════════════
   WEBGL — exact port of original logic
   ════════════════════════════════════════════════════════════════════ */
(function () {

  /* Vertex shader — port of original Ea */
  const VS = `
    varying float vFacing;
    varying vec2 vUv;
    void main() {
      vUv = uv;
      vec3 wn = normalize(normalMatrix * normal);
      vec3 vd = normalize(-(modelViewMatrix * vec4(position,1.0)).xyz);
      vFacing = dot(wn, vd);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
    }`;

  /* Fragment shader — port of original Aa
     - backfaces are darkened via vFacing (no wireframe artefacts)
     - active tiles become brighter                                   */
  const FS = `
    precision highp float;
    uniform sampler2D tMap;
    uniform float uAlpha;
    uniform float uIsActive;
    varying vec2 vUv;
    varying float vFacing;
    void main() {
      vec4 color  = texture2D(tMap, vUv);
      color.a     = uAlpha;
      float isBack   = step(vFacing, 0.0);
      float darken   = mix(1.0, 0.22, isBack);
      darken         = mix(darken, 1.0, uIsActive);
      color.rgb     *= darken;
      color.rgb     *= mix(1.0, 1.2, uIsActive);
      gl_FragColor   = color;
    }`;

  /* ── Geometry placer — direct port of original lo() ──
     Distributes PlaneGeometry tiles across 6 cube faces.
     index / length / size → position + rotation per tile  */
  function placeTile(media, index, length, size) {
    const perFace = Math.ceil(length / 6);
    const faceIdx = Math.floor(index / perFace);
    const local = index % perFace;
    const cols = Math.ceil(Math.sqrt(perFace));
    const col = local % cols;
    const row = Math.floor(local / cols);
    const fd = size * 1.9;   // face distance from center
    const sp = size * 1.25;  // spacing between cells
    const ctr = (cols - 1) / 2;

    const faces = [
      { x: fd, y: (row - ctr) * sp, z: (col - ctr) * sp, rx: 0, ry: Math.PI / 2, rz: 0 },  // +X
      { x: -fd, y: (row - ctr) * sp, z: -(col - ctr) * sp, rx: 0, ry: -Math.PI / 2, rz: 0 },  // -X
      { x: (col - ctr) * sp, y: fd, z: (row - ctr) * sp, rx: -Math.PI / 2, ry: 0, rz: 0 },  // +Y
      { x: (col - ctr) * sp, y: -fd, z: -(row - ctr) * sp, rx: Math.PI / 2, ry: 0, rz: 0 },  // -Y
      { x: (col - ctr) * sp, y: (row - ctr) * sp, z: fd, rx: 0, ry: 0, rz: 0 },  // +Z
      { x: -(col - ctr) * sp, y: (row - ctr) * sp, z: -fd, rx: 0, ry: Math.PI, rz: 0 },  // -Z
    ];
    const f = faces[faceIdx] || faces[0];
    media.mesh.position.set(f.x, f.y, f.z);
    media.mesh.rotation.set(f.rx, f.ry, f.rz);
  }

  /* ── Renderer (matches original: alpha, antialias, appended to body) ── */
  const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);

  // Slot renderer into the placeholder canvas element
  const ph = document.getElementById('ts-cv');
  ph.replaceWith(renderer.domElement);
  Object.assign(renderer.domElement.style, {
    position: 'absolute', inset: '0',
    width: '100%', height: '100%', zIndex: '999', display: 'block'
  });
  renderer.domElement.id = 'ts-cv';

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.z = 4;  // original value
  const clock = new THREE.Clock();

  /* Shared geometry — one PlaneGeometry for all tiles (original: qs(1,1,1,1) = BoxGeometry,
     but the tiles use PlaneGeometry via the media mesh — here we match the visual exactly) */
  const geo = new THREE.PlaneGeometry(1, 1);

  /* ── TileMedia — port of original Ca class ── */
  class TileMedia {
    constructor(index, length, texture) {
      this.index = index; this.length = length; this.texture = texture;
      this._mkMat(); this._mkMesh();
    }
    _mkMat() {
      this.mat = new THREE.ShaderMaterial({
        vertexShader: VS, fragmentShader: FS,
        uniforms: {
          tMap: { value: this.texture },
          uAlpha: { value: 0 },
          uIsActive: { value: 0 },
          uTime: { value: 0 },
        },
        transparent: true,
        side: THREE.DoubleSide,  // DoubleSide + facing shader = correct backface darkening, no wireframe
      });
    }
    _mkMesh() {
      this.mesh = new THREE.Mesh(geo, this.mat);
      this.mesh.scale.set(1, 1, 1);
    }
    show({ delay = 0 } = {}) {
      gsap.timeline({ delay, defaults: { ease: 'expo.inOut', duration: 1.5 } })
        .fromTo(this.mat.uniforms.uAlpha, { value: 0 }, { value: 1 }, 0);
    }
    setAlpha(v) {
      gsap.killTweensOf(this.mat.uniforms.uAlpha);
      gsap.to(this.mat.uniforms.uAlpha, { value: v, duration: .8, ease: 'power2.out' });
    }
    setActive(v) {
      gsap.killTweensOf(this.mat.uniforms.uIsActive);
      gsap.to(this.mat.uniforms.uIsActive, { value: v ? 1 : 0, duration: .8, ease: 'power2.out' });
    }
    update() { this.mat.uniforms.uTime.value += 0.016; }
    destroy() {
      gsap.killTweensOf(this.mat.uniforms.uAlpha);
      gsap.killTweensOf(this.mat.uniforms.uIsActive);
      this.mat.dispose();
    }
  }

  /* ── IndexGallery — port of original Pa class ──
   *
   * REFACTOR NOTE
   * On integration, this class must accept its data source as a
   * parameter (PROJECTS array, JSON URL, or hook callback) instead
   * of closing over the module-level PROJECTS constant. Same for
   * the texture map: the gallery should be agnostic about where
   * tiles come from. */
  class IndexGallery {
    constructor() {
      this.parentGroup = new THREE.Group();
      this.group = new THREE.Group();
      this.parentGroup.add(this.group);
      this.rotX = 0.06; this.rotY = 0.18; this.rotZ = 0.02;
      this.tScale = 5; this.lastT = 0; this.gScale = 0.45;
      this.medias = []; this.transitionToHide = false;
      scene.add(this.parentGroup);
    }

    build(texMap) {
      PROJECTS.forEach((proj, i) => {
        const tex = texMap.get(proj.id);
        if (!tex) return;
        const m = new TileMedia(i, N, tex);
        m.slug = proj.slug;
        const sz = Math.max(m.mesh.scale.x, m.mesh.scale.y);
        placeTile(m, i, N, sz);
        this.group.add(m.mesh);
        this.medias.push(m);
        m.show({ delay: 0.25 + i * 0.04 });
      });
      // Entrance animation — exact match of original show()
      this.group.rotation.x = 0; this.group.rotation.y = 0;
      const tl = gsap.timeline({ defaults: { ease: 'expo.inOut', duration: 2.5 } });
      tl.fromTo(this.parentGroup.scale,
        { x: 0, y: 0, z: 0 },
        { x: this.gScale, y: this.gScale, z: this.gScale }, 0
      ).fromTo(this.parentGroup.rotation,
        { x: -Math.PI * 0.2, y: -Math.PI * 1.85 },
        { x: 0, y: 0 }, 0
      ).timeScale(0.85);
    }

    onMouseEnter(slug) {
      if (this.transitionToHide) return;
      this.medias.forEach(m => {
        const hit = m.slug === slug;
        m.setAlpha(hit ? 1 : 0.1);
        m.setActive(hit);
      });
      this.tScale = 0.25;
      gsap.to(this.parentGroup.scale, { x: .55, y: .55, z: .55, duration: 1, ease: 'expo.out' });
    }

    onMouseLeave() {
      if (this.transitionToHide) return;
      this.medias.forEach(m => { m.setAlpha(1); m.setActive(false); });
      this.tScale = 5;
      gsap.to(this.parentGroup.scale,
        { x: this.gScale, y: this.gScale, z: this.gScale, duration: 1, ease: 'expo.out' });
    }

    update(elapsed) {
      const d = elapsed - this.lastT;
      this.lastT = elapsed;
      if (d > 0.2) return;
      this.group.rotation.x += d * this.rotX * this.tScale;
      this.group.rotation.y += d * this.rotY * this.tScale;
      this.group.rotation.z += d * this.rotZ * this.tScale;
      this.medias.forEach(m => m.update());
    }
    destroy() {
      this.medias.forEach(m => { this.group.remove(m.mesh); m.destroy(); });
      scene.remove(this.parentGroup);
    }
  }

  /* ── Resize ── */
  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
  });

  /* ── RAF ── */
  let gallery = null;
  (function raf() {
    requestAnimationFrame(raf);
    if (gallery) gallery.update(clock.getElapsedTime());
    renderer.render(scene, camera);
  })();

  /* ── Expose API ──
   *
   * INTEGRATION NOTE
   * window._TSGallery is the public surface for the cube. The
   * sidebar menu (and any future navigation asset) talks to it
   * through enter(slug) / leave(). On integration, this should be
   * exposed as a proper module export (or a registered Toolskin
   * component instance) rather than a global on window. */
  window._TSGallery = {
    preload(onProg, onDone) {
      const mgr = new THREE.LoadingManager();
      const ldr = new THREE.TextureLoader(mgr);
      const texMap = new Map();
      let prog = 0;
      mgr.onProgress = (_, l, t) => onProg(l / t);
      mgr.onLoad = () => onDone(texMap);
      PROJECTS.forEach(p => {
        ldr.load(p.main, tex => {
          tex.needsUpdate = true;
          tex.colorSpace = THREE.SRGBColorSpace;
          texMap.set(p.id, tex);
        }, undefined, () => { texMap.set(p.id, null); });
      });
    },
    init(texMap) {
      gallery = new IndexGallery();
      gallery.build(texMap);
    },
    enter(slug) { gallery?.onMouseEnter(slug); },
    leave() { gallery?.onMouseLeave(); },
  };
})();

/* Eased scroll
 * ──────────────────────────────────────────────────────────────────
 * REFACTOR NOTE: this should either become part of the slide-menu
 * module (pending integration), OR be extracted as a reusable
 * function for broader use. Modular approach. Verify which option
 * is feasible and optimize, but ensure the current performance
 * profile is preserved. */
let mTgt = 0, mCur = 0;
sb.addEventListener('mousemove', e => {
  const r = sb.getBoundingClientRect();
  const ry = Math.max(0, Math.min(r.height, e.clientY - r.top));
  const max = Math.max(0, MENU_LIST.length * ITEM_H - r.height);
  mTgt = -(ry / r.height * max);
});
(function mRaf() {
  requestAnimationFrame(mRaf);
  mCur += (mTgt - mCur) * 0.08;
  mt.style.transform = `translateY(${mCur}px)`;
})();

/* Hover — SINGLE active item only (fix: no slug-group activation) */

    activeLink = lnk;

    // This exact node = active, all others = dimmed
    links.forEach(l => {
      if (l === lnk) {
        l.classList.remove('is-dimmed');
        l.classList.add('is-active');
      } else {
        l.classList.remove('is-active');
        l.classList.add('is-dimmed');
      }
    });

    // Cube: highlight tiles for this slug only
    window._TSGallery?.enter(lnk.dataset.slug);
  });

  //lnk.addEventListener('mouseleave', () => bigCursor(false));

  lnk.addEventListener('click', e => {
    e.preventDefault();
    const p = PROJECTS.find(x => x.slug === lnk.dataset.slug);

  });

sb.addEventListener('mouseleave', () => {

  if (activeLink) { activeLink.classList.remove('is-active'); activeLink = null; }

  const w = p.title.split(' ');
  document.getElementById('d-title').innerHTML = `<em>${w[0]}</em> ${w.slice(1).join(' ')}`;
  document.getElementById('d-desc').textContent = p.desc;
  document.getElementById('d-meta').innerHTML =
    [['Year', p.year], ['Type', p.type], ['Client', p.client]]
      .map(([k, v]) => `<div class="ts-dmetablock"><span class="ts-dmetalabel">${k}</span><span class="ts-dmetaval">${v}</span></div>`)
      .join('');
  document.getElementById('d-imgs').innerHTML =
    p.imgs.slice(0, 4).map(s => `<img src="${s}" alt="${p.title}" loading="lazy">`).join('');

  gsap.timeline()
    .set(wipeEl, { scaleY: 0, transformOrigin: 'bottom' })
    .to(wipeEl, { scaleY: 1, duration: .42, ease: 'power3.inOut' })
    .set(detEl, { transform: 'translateY(0)', opacity: 1 })
    .call(() => { detEl.classList.add('open'); detEl.scrollTop = 0; })
    .to(wipeEl, { scaleY: 0, transformOrigin: 'top', duration: .38, ease: 'power3.inOut' });
}

function closeDetail() {
  gsap.timeline()
    .set(wipeEl, { scaleY: 0, transformOrigin: 'bottom' })
    .to(wipeEl, { scaleY: 1, duration: .38, ease: 'power3.inOut' })
    .set(detEl, { transform: 'translateY(100%)' })
    .call(() => detEl.classList.remove('open'))
    .to(wipeEl, { scaleY: 0, transformOrigin: 'top', duration: .34, ease: 'power3.inOut' });
}

document.getElementById('ts-dback').addEventListener('click', closeDetail);
document.addEventListener('keydown', e => { if (e.key === 'Escape' && detEl.classList.contains('open')) closeDetail(); });
['mouseenter', 'mouseleave'].forEach((ev, i) =>
  document.getElementById('ts-dback').addEventListener(ev, () => bigCursor(!i))
);

/* ════════════════════════════════════════════════════════════════════
 * LOADER  — preloads textures, then reveals the cube
 *
 * STATUS: pending integration
 * ──────────────────────────────────────────────────────────────────
 * This loader works perfectly in this context — better than the
 * legacy preloader. It fits perfectly for loading the Three.js
 * assets and images.
 *
 * REQUIREMENTS FOR INTEGRATION
 * ──────────────────────────────────────────────────────────────────
 *  - Unify the theme and visual look of this preloader with the
 *    global one.
 *  - Force the global / main preloader to NOT load here, to avoid
 *    crashes and conflicts when this frame and the separated
 *    assets coexist.
 *  - Currently everything is merged under the same wrapper. All of
 *    it should be modular.
 * ════════════════════════════════════════════════════════════════════ */
const loaderEl = document.getElementById('ts-loader');
const fillEl = document.getElementById('ts-loader-fill');
const numEl = document.getElementById('ts-loader-num');
let dispPct = 0, realPct = 0, loaderDone = false;

(function lRaf() {
  if (loaderDone) return;
  requestAnimationFrame(lRaf);
  dispPct += (realPct - dispPct) * 0.1;
  const p = Math.min(99, Math.floor(dispPct * 100));
  fillEl.style.width = p + '%';
  numEl.textContent = p + '%';
})();

window._TSGallery.preload(
  prog => { realPct = Math.max(realPct, prog); },
  texMap => {
    realPct = 1;
    setTimeout(() => {
      // Build cube — textures are ready, no blank faces
      window._TSGallery.init(texMap);

      fillEl.style.width = '100%';
      numEl.textContent = '100%';
      loaderDone = true;

      setTimeout(() => {
        loaderEl.classList.add('out');
        // Reveal scene
        gsap.to('#ts-letters', { opacity: 1, y: 0, duration: 1.3, ease: 'power4.out', delay: .05 });
        gsap.to('#ts-meta-bl', { opacity: 1, y: 0, duration: .9, ease: 'power3.out', delay: .3 });
        gsap.to('#ts-meta-bc', { opacity: 1, y: 0, duration: .9, ease: 'power3.out', delay: .45 });
        // Wave-reveal menu
        revealMenu();
      }, 350);
    }, 250);
  }
);

/* ════════════════════════════════════════════════════════════════════
 * SVG RULERS  — current implementation
 * ──────────────────────────────────────────────────────────────────
 * SVG-based ruler component, ResizeObserver-driven. This is the
 * version to keep and promote into the core. Supersedes the
 * legacy buildRulers() at the top of this file.
 *
 * Promote to a Toolskin core component. Document in the codebase
 * showcase docs as one of the flagship innovations of the system.
 * ════════════════════════════════════════════════════════════════════ */
function getCSSVar(name, el = document.documentElement) {
  return getComputedStyle(el).getPropertyValue(name).trim();
}

const rsz = parseFloat(getCSSVar("--rsz")) || 1;

function createRulerSVG({ width, height, orientation = "horizontal", step = 10, majorStep = 100 }) {
  const ns = "http://www.w3.org/2000/svg";

  const svg = document.createElementNS(ns, "svg");
  const thickness = rsz;
  svg.setAttribute("class", `ts-grid-rules__${orientation}`);
  svg.setAttribute("width", orientation === "horizontal" ? width : thickness);
  svg.setAttribute("height", orientation === "horizontal" ? thickness : height);
  svg.setAttribute(
    "viewBox",
    orientation === "horizontal"
      ? `0 0 ${width} ${thickness}`
      : `0 0 ${thickness} ${height}`
  );

  const max = orientation === "horizontal" ? width : height;

  for (let i = 0; i <= max; i += step) {
    const isMajor = i % majorStep === 0;
    const isMid = i % 50 === 0;

    const line = document.createElementNS(ns, "line");

    if (orientation === "horizontal") {
      line.setAttribute("x1", i);
      line.setAttribute("x2", i);
      line.setAttribute("y1", 0);
      line.setAttribute("y2", isMajor ? 7 : isMid ? 5 : 2);
    } else {
      line.setAttribute("y1", i);
      line.setAttribute("y2", i);
      line.setAttribute("x1", 0);
      line.setAttribute("x2", isMajor ? 7 : isMid ? 5 : 2);
    }

    line.setAttribute("class", "ts-grid-rules-line");
    if (!isMajor) line.setAttribute("opacity", "0.5");

    svg.appendChild(line);

    // Labels (only major)
    if (isMajor && i !== 0) {
      const text = document.createElementNS(ns, "text");

      if (orientation === "horizontal") {
        text.setAttribute("x", i);
        text.setAttribute("y", 16);
      } else {
        text.setAttribute("x", 14);
        text.setAttribute("y", i + 4);
        text.setAttribute("transform", `rotate(-90 14 ${i})`);
      }

      text.setAttribute("class", "ts-grid-rules-text");
      text.textContent = i;

      svg.appendChild(text);
    }
  }

  return svg;
}
function mountRulers(container) {
  const wrapper = document.createElement("div");
  wrapper.className = "ts-grid-rules";

  function render() {
    wrapper.innerHTML = "";

    const rect = container.getBoundingClientRect();

    const horizontal = createRulerSVG({
      width: Math.round(rect.width),
      height: 18,
      orientation: "horizontal"
    });

    const vertical = createRulerSVG({
      width: 18,
      height: Math.round(rect.height),
      orientation: "vertical"
    });

    wrapper.appendChild(horizontal);
    wrapper.appendChild(vertical);
  }

  render();

  const ro = new ResizeObserver(render);
  ro.observe(container);

  container.appendChild(wrapper);
}
document.addEventListener("DOMContentLoaded", () => {
  const container = document.querySelector("#ts-app");

  if (!container) {
    console.warn("Ruler init failed: container not found");
    return;
  }

  mountRulers(container);
  document.getElementById('ts-dims').textContent = `${window.innerWidth}px × ${window.innerHeight}px`;
});
</script>
