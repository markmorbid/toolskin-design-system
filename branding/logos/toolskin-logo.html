<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Toolskin Logo — Dark</title>
<style>
  @font-face{font-family:'Space Grotesk';src:url('../fonts/SpaceGrotesk-VariableFont_wght.ttf') format('truetype-variations');font-weight:300 700;font-display:swap;}
  html,body{margin:0;padding:0;background:#0c0d0f;height:100%;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',system-ui,sans-serif;}
  .lockup{display:inline-flex;align-items:center;gap:14px;font-weight:700;letter-spacing:-.04em;font-size:88px;line-height:1;color:#e8e9ea;}
  .br{display:inline-block;width:18px;height:96px;border:8px solid #FF5500;border-right:none;}
  .br.right{border:8px solid #FF5500;border-left:none;}
  .caret{display:inline-block;width:8px;height:74px;background:rgba(232,233,234,0.45);margin:0 4px;}
  .accent{color:#FF5500;}
</style></head>
<body>
  <div class="lockup">
    <span class="br"></span>
    <span>TOOL</span>
    <span class="caret"></span>
    <span class="accent">SKIN</span>
    <span class="br right"></span>
  </div>
</body></html>
