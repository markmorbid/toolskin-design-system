      <path d="M 32 12 H 46 a 5 5 0 0 1 0 10 H 36 a 5 5 0 0 0 0 10 H 46 a 5 5 0 0 1 0 10 H 32" fill="none" stroke="var(--bar2, #FF5500)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"></path>
    </symbol>
    <symbol id="ts-diamond" viewBox="0 0 240 100">
      <g transform="translate(50 50) rotate(45)">
        <rect x="-30" y="-30" width="60" height="60" rx="4" fill="none" stroke="var(--bar1, #e8e9ea)" stroke-width="3"></rect>
      </g>
      <g transform="translate(50 50) rotate(45)">
