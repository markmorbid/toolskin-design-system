
<svg xmlns="http://www.w3.org/2000/svg" width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <symbol id="ts-layerstack" viewBox="0 0 240 100">
      <rect x="7" y="15" width="84" height="16" rx="4" fill="var(--bar1, #e8e9ea)"></rect>
      <rect x="16" y="42" width="84" height="16" rx="4" fill="var(--bar2, #FF5500)"></rect>
      <rect x="7" y="68" width="84" height="16" rx="4" fill="var(--bar3, rgba(232,233,234,0.22))"></rect>
      <text x="108" y="35" font-family="&#39;Space Grotesk&#39;,system-ui,sans-serif" font-size="52" letter-spacing="-1.5" font-weight="900" fill="var(--word1, #e8e9ea)" dominant-baseline="middle">TOOL</text>
      <text x="110" y="78" font-family="&#39;Space Grotesk&#39;,system-ui,sans-serif" font-size="52" letter-spacing="1" font-weight="900" fill="var(--word2, #FF5500)" dominant-baseline="middle">SKIN</text>
    </symbol>
    <symbol id="ts-layerstack-icon" viewBox="0 0 32 32">
      <rect x="0" y="2" width="22" height="7" rx="1.5" fill="var(--bar1, #e8e9ea)"></rect>
      <rect x="5" y="12" width="22" height="7" rx="1.5" fill="var(--bar2, #FF5500)"></rect>
      <rect x="2" y="22" width="22" height="7" rx="1.5" fill="var(--bar3, rgba(232,233,234,0.4))"></rect>
    </symbol>
    <symbol id="ts-monogram" viewBox="0 0 240 100">
