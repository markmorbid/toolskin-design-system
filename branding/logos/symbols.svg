      <rect x="29" y="14" width="14" height="72" rx="2" fill="var(--bar1, #e8e9ea)"></rect>
      <path d="M 78 19 H 104 a 9 9 0 0 1 0 18 H 86 a 9 9 0 0 0 0 18 H 104 a 9 9 0 0 1 0 18 H 78" fill="none" stroke="var(--bar2, #FF5500)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"></path>
      <text x="130" y="44" font-family="&#39;Space Grotesk&#39;,system-ui,sans-serif" font-size="22" letter-spacing="-0.6" font-weight="700" fill="var(--word1, #e8e9ea)">TOOL<tspan fill="var(--word2, #FF5500)">SKIN</tspan></text>
      <text x="130" y="68" font-family="&#39;JetBrains Mono&#39;,monospace" font-size="9" letter-spacing="2" fill="var(--caption, rgba(232,233,234,0.4))">DESIGN SYSTEM</text>
