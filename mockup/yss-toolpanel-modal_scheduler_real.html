<div id="yss-modal-overlay" class="yss-modal-overlay closable">
    <div class="yss-modal-content yss-sticky-modal" style="max-width: 600px;">
        <div class="yss-modal-title">
            <h3>Bulk Scheduler Configuration</h3>
            <button class="yss-btn yss-btn-icon yss-close-btn"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="yss-modal-view">

            <!-- ═══ Scheduling Fields Block ═══ -->
            <div id="yss-scheduling-fields" class="yss-block-group-fields">
                <h4 class="yss-modal-block-subtitle"
                    data-tooltip="Schedule your unlisted videos as Premieres. After confirming, it will process your video rows automatically using the configured start time and intervals."
                    data-tooltip-align="left">Bulk Scheduler Settings</h4>

                <div class="yss-form-group">
                    <label>Start Date</label>
                    <input type="date" class="yss-input yss-datepicker" id="yss-start-date" value="2026-03-15">

                </div>

                <div class="yss-form-group">
                    <label>Start Time (24h format)</label>
                    <input type="time" class="yss-input yss-datepicker" id="yss-start-time" value="14:00">
                </div>

                <div class="yss-form-group">
                    <label>Interval Type</label>
                    <div>
                        <div class="yss-radio yss-input-container-clickable" style="cursor: pointer;">
                            <input type="radio" name="intervalType" id="yss-interval-predefined">
                            <span> Predefined (:20, :30, :40)</span>
                        </div>
                        <div class="yss-radio yss-input-container-clickable" style="cursor: pointer;">
                            <input type="radio" name="intervalType" id="yss-interval-custom" checked="">
                            <span> Custom</span>
                        </div>
                    </div>
                </div>

                <div class="yss-form-group" id="yss-custom-interval-group" style="display: flex;">
                    <div class="yss-form-group">
                        <label>Interval Hours</label>
                        <div class="yss-number-input-wrapper">
                            <input type="number" id="yss-interval-hours" value="2" min="0">
                            <div class="yss-number-input-controls">
                                <button type="button" class="yss-number-btn" aria-label="Increment"><i
                                        class="fa-solid fa-chevron-up"
                                        style="font-size: inherit; color: currentcolor;"></i></button>
                                <button type="button" class="yss-number-btn" aria-label="Decrement"><i
                                        class="fa-solid fa-chevron-down"
                                        style="font-size: inherit; color: currentcolor;"></i></button>
                            </div>
                        </div>
                    </div>
                    <div class="yss-form-group">
                        <label>Interval Minutes</label>
                        <div class="yss-number-input-wrapper">
                            <input type="number" id="yss-interval-minutes" value="0" min="0">
                            <div class="yss-number-input-controls">
                                <button type="button" class="yss-number-btn" aria-label="Increment"><i
                                        class="fa-solid fa-chevron-up"
                                        style="font-size: inherit; color: currentcolor;"></i></button>
                                <button type="button" class="yss-number-btn" aria-label="Decrement"><i
                                        class="fa-solid fa-chevron-down"
                                        style="font-size: inherit; color: currentcolor;"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ═══ Renaming Fields Block ═══ -->
            <div id="yss-renaming-fields" class="yss-block-group-fields">
                <h4 class="yss-modal-block-subtitle"
                    data-tooltip="You can rename videos alongside scheduling, or switch to Rename-Only mode. Provide titles separated by --- or use the {num} pattern with a numeric range to auto-generate a series."
                    data-tooltip-align="left">Renaming Settings</h4>

                <div class="yss-form-group">
                    <label>Video Titles (one per line, separate with '---')</label>
                    <textarea id="yss-titles" placeholder="Title 1 --- Title 2 --- Title 3"></textarea>
                </div>

                <div class="yss-form-group yss-input-container-clickable"
                    data-tooltip="Automatically generate a sequence of titles using a pattern with {num}. Enter a template (e.g., My Awesome Video Title [Vol.{num}]) and set a start and end number."
                    style="cursor: pointer;">
                    <label class="yss-checkbox-label">
                        <input type="checkbox" id="yss-generate-titles-cb">
                        <span> Generate Titles from Pattern</span>
                    </label>
                </div>

                <div id="yss-title-generator-fields" style="display: none; margin-top: -10px;">
                    <div class="yss-form-group"
                        style="display: flex;gap: 1px;margin-top: -5px;border: 1px solid var(--yss-panel-border);border-radius: 0;border-bottom-width: 0px;overflow: hidden;">
                        <label>Title Pattern (use {num})</label>
                        <input type="text" id="yss-title-pattern"
                            placeholder="e.g., Your Awesome Video Title [Vol.{num}]">
                    </div>
                    <div
                        style="display: flex;gap: 1px;margin-top: -10px;border: 0px solid var(--yss-panel-border);border-radius: 0 0 var(--yss-border-radius) var(--yss-border-radius);background: var(--yss-panel-border);padding: 1px;overflow: hidden;flex-direction: row;align-items: stretch;flex-wrap: nowrap;">
                        <div class="yss-form-group" style="border-width: 0px;border-radius: 0;">
                            <label>Start #</label>
                            <div class="yss-number-input-wrapper">
                                <input type="number" id="yss-start-number" value="1">
                                <div class="yss-number-input-controls">
                                    <button type="button" class="yss-number-btn" aria-label="Increment"><i
                                            class="fa-solid fa-chevron-up"
                                            style="font-size: inherit; color: currentcolor;"></i></button>
                                    <button type="button" class="yss-number-btn" aria-label="Decrement"><i
                                            class="fa-solid fa-chevron-down"
                                            style="font-size: inherit; color: currentcolor;"></i></button>
                                </div>
                            </div>
                        </div>
                        <div class="yss-form-group" style="
	border-width: 0px;
	border-radius: 0;
">
                            <label>End #</label>
                            <div class="yss-number-input-wrapper">
                                <input type="number" id="yss-end-number" value="100">
                                <div class="yss-number-input-controls">
                                    <button type="button" class="yss-number-btn" aria-label="Increment"><i
                                            class="fa-solid fa-chevron-up"
                                            style="font-size: inherit; color: currentcolor;"></i></button>
                                    <button type="button" class="yss-number-btn" aria-label="Decrement"><i
                                            class="fa-solid fa-chevron-down"
                                            style="font-size: inherit; color: currentcolor;"></i></button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="yss-form-group yss-input-container-clickable" id="yss-replace-mode-group"
                    data-tooltip="Enable bulk search &amp; replace on video titles. This runs separately from scheduling and is used only for fixing or updating titles."
                    style="cursor: pointer;">
                    <label class="yss-checkbox-label">
                        <input type="checkbox" id="yss-bulk-replace-cb">
                        <span> Bulk replace word/string on titles</span>
                    </label>
                </div>

                <div id="yss-replace-inputs" style="display: none; gap: 0px; margin-top: -10px; border-top: 0px;">
                    <div style="display: flex;gap: 1px;width: stretch;background: var(--yss-panel-border);">
                        <div class="yss-form-group" style="border-right-width: 0px;background: var(--yss-panel-bg-3);">
                            <label>Search Text</label>
                            <input type="text" id="yss-replace-search" placeholder="Text to search for">
                        </div>
                        <div class="yss-form-group" style="background: var(--yss-panel-bg-3);">
                            <label>Replacement Text</label>
                            <input type="text" id="yss-replace-with" placeholder="Replacement Text">
                        </div>
                    </div>
                </div>
            </div>

        </div>
        <div class="yss-modal-actions">
            <div class="yss-modal-actions-left">
                <button id="yss-modal-cancel" class="yss-btn yss-btn-stop" data-tooltip="Cancel and close"><i
                        class="fa-solid fa-times"></i><span>Cancel</span></button>
                <button id="yss-modal-summary" class="yss-btn yss-btn-secondary"
                    data-tooltip="View scheduling summary"><i class="fa-solid fa-chart-bar"></i><span>Show
                        Summary</span></button>
            </div>
            <div class="yss-modal-actions-right">
                <button id="yss-replace-start-btn" class="yss-btn yss-btn-start" disabled=""
                    data-tooltip="Start bulk replace"><i class="fa-solid fa-magnifying-glass"></i><span>Start
                        Replace</span></button>
                <button id="yss-modal-confirm" class="yss-btn yss-btn-start"
                    data-tooltip="Confirm configuration and start scheduling"><i
                        class="fa-solid fa-play"></i><span>Confirm &amp; Start</span></button>
            </div>
        </div>
    </div>
</div>
