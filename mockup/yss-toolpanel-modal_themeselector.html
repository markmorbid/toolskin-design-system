<!-- YSS Theme & Appearance Modal — extracted from Youtube_Toolpanel_4.2.7.user.js showThemeSelectorModal() -->
<div class="yss-modal-overlay yss-modal-overlay-closable" id="yss-modal-overlay">
    <div class="yss-modal-content yss-sticky-modal" id="yss-theme-modal" style="max-width:600px;">
        <div class="yss-modal-title" style="cursor: move;">
            <h3>Theme &amp; Appearance</h3>
            <button class="yss-btn yss-btn-icon yss-close-btn" title="Close">
                <i class="fa-solid fa-xmark" style="font-size: inherit; color: currentcolor;"></i>
            </button>
        </div>

        <div class="yss-modal-view">
            <!-- ── Select a Theme ── -->
            <div>
                <h4 style="margin-bottom:8px;">Select a Theme</h4>
                <div class="yss-form-group yss-theme-option yss-input-container-clickable" style="cursor:pointer;">
                    <label>
                        <input type="radio" name="theme-select" id="theme-default" value="default" checked>
                        <span>Default Theme</span>
                    </label>
                </div>
                <div class="yss-form-group yss-theme-option yss-input-container-clickable" style="cursor:pointer;">
                    <label>
                        <input type="radio" name="theme-select" id="theme-flat" value="flat">
                        <span>Flat Theme</span>
                    </label>
                </div>

                <!-- Nested Flat Theme Options -->
                <div class="yss-nested-options" id="flat-options"
                    style="display:none;padding-left:16px;margin-top:4px;">
                    <div class="yss-form-group" style="display:flex;align-items:center;gap:8px;">
                        <span>Gradient Buttons:</span>
                        <label class="yss-switch">
                            <input type="checkbox" id="gradient-buttons-toggle">
                            <span class="yss-switch-slider"></span>
                        </label>
                    </div>
                    <div class="yss-form-group" style="display:flex;align-items:center;gap:8px;">
                        <span>Color on Hover:</span>
                        <label class="yss-switch">
                            <input type="checkbox" id="color-hover-toggle">
                            <span class="yss-switch-slider"></span>
                        </label>
                    </div>
                </div>
            </div>

            <!-- ── General Appearance ── -->
            <div style="margin-top:16px;">
                <h4 style="margin-bottom:8px;">General Appearance</h4>
                <div class="yss-form-group" style="display:flex;align-items:center;gap:8px;">
                    <span>Show Tooltips:</span>
                    <label class="yss-switch">
                        <input type="checkbox" id="tooltips-modal-toggle" checked>
                        <span class="yss-switch-slider"></span>
                    </label>
                </div>
                <div class="yss-form-group" style="display:flex;align-items:center;gap:8px;">
                    <span>Icon-Only Mode:</span>
                    <label class="yss-switch">
                        <input type="checkbox" id="icons-only-modal-toggle">
                        <span class="yss-switch-slider"></span>
                    </label>
                </div>
                <div class="yss-form-group" style="display:flex;align-items:center;gap:8px;">
                    <span>UI Transitions:</span>
                    <label class="yss-switch">
                        <input type="checkbox" id="transitions-modal-toggle" checked>
                        <span class="yss-switch-slider"></span>
                    </label>
                </div>
            </div>
        </div>

        <div class="yss-modal-actions">
            <div class="yss-modal-actions-left">
                <button class="yss-btn yss-btn-secondary yss-close-btn"><i
                        class="fa-solid fa-xmark"></i><span>Close</span></button>
            </div>
        </div>
    </div>
</div>
